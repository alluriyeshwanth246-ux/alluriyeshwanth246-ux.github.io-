<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Golden Bakery</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <preconnect href="https://fonts.googleapis.com">
  <preconnect href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" crossorigin href="./index-B3vW0b-V.css">
</head>
<body>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://wxngmqbwnhreccxvhojv.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc2MiOiJzdXBhYmFzZSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxN2Fub25mZmZzZSIImFub24iLCJpY00zQiQiOjE3ODMzMzYyMDMsImV4cCI6M2CcCI6MjA1ODkxMjIwM30.GvtHlA6pzR_Kpood7gccglsC4fFvH4gbJsiyQnIs82Q";
    
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // 1. Function to load menu items onto the screen
    async function loadMenu() {
      try {
        const { data: menuItems, error } = await supabaseClient.from('menu_items').select('*');
        if (error) return;

        const menuContainer = document.getElementById('menu-container');
        if (!menuContainer) return;
        
        menuContainer.innerHTML = '';

        menuItems.forEach(item => {
          const itemCard = `
            <div class="menu-card">
              <img src="${item.image_url}" alt="${item.name}" class="menu-img">
              <h3>${item.name}</h3>
              <p>${item.description}</p>
              <span class="price">₹${item.price}</span>
              <button onclick="addToCart('${item.id}', '${item.name}', ${item.price})">Add to Cart</button>
            </div>
          `;
          menuContainer.insertAdjacentHTML('beforeend', itemCard);
        });
      } catch (err) {
        console.error(err);
      }
    }

    // 2. Automated Checkout Interceptor (Saves orders to Supabase)
    async function handleOnlineCheckout(event) {
      // Look for a checkout or place order button click
      const target = event.target;
      if (target && (target.innerText.toLowerCase().includes('place order') || target.innerText.toLowerCase().includes('checkout'))) {
        
        // Grab values from input fields if they exist on the screen
        const nameInput = document.querySelector('input[placeholder*="Name"]') || document.querySelector('input[type="text"]');
        const phoneInput = document.querySelector('input[placeholder*="Phone"]') || document.querySelector('input[type="tel"]');
        const totalElement = document.querySelector('.total-price') || document.querySelector('[class*="total"]');

        const customerName = nameInput ? nameInput.value : "Online Customer";
        const phone = phoneInput ? phoneInput.value : "No Phone Provided";
        const totalAmount = totalElement ? parseFloat(totalElement.innerText.replace(/[^0-9.]/g, '')) : 0;

        // Save order data directly into your Supabase orders table
        try {
          await supabaseClient.from('orders').insert([{
            customer_name: customerName,
            phone: phone,
            total_amount: totalAmount,
            payment_status: 'pending',
            items: { description: "Order submitted via web portal checkout button click" }
          }]);
          console.log("Order securely tracked in Supabase database!");
        } catch (dbError) {
          console.error("Database tracking failed:", dbError);
        }
      }
    }

    // Bind listeners safely
    document.addEventListener('DOMContentLoaded', loadMenu);
    document.addEventListener('click', handleOnlineCheckout);
  </script>

  <script type="module" crossorigin src="./index-CS_Uzv2Q.js"></script>

</body>
</html>
